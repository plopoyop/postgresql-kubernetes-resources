---
suite: default install
tests:
  - it: should generate the default postgresql resource
    asserts:
      - isKind:
          of: postgresql
        template: postgresql.yaml
      - hasDocuments:
          count: 1
        template: postgresql.yaml

  - it: should not generate postgresteam by default
    asserts:
      - hasDocuments:
          count: 0
        template: postgresteam.yaml

  - it: should have the correct naming
    asserts:
      - equal:
          path: metadata.name
          value: example-postgresql
        template: postgresql.yaml
